name: CI

on:
  push:
    branches: [main, dev, dev_ionos, prod_IONOS]
  pull_request:
    branches: [main, dev, dev_ionos, prod_IONOS]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    env:
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      AUTH_SECRET: "ci-test-secret-not-real"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
