<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ferm'Afrik</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #16311f 0%, #224735 48%, #10261b 100%);
        color: #fff;
        font-family: Inter, Arial, sans-serif;
        padding: 24px;
      }

      main {
        max-width: 420px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        padding: 32px 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.84);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ferm'Afrik</h1>
      <p>
        Le conteneur Android est pret. Configurez maintenant la variable
        <code>CAPACITOR_SERVER_URL</code> pour connecter cette application a votre instance privee.
      </p>
    </main>
  </body>
</html>
